<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seni Seviyorum — Dünyanın Her Dilinde</title>
    <meta name="description" content="Seni seviyorum — dünyanın dört bir yanındaki dillerde, dönen bir 3D vitrinle." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap"
        rel="stylesheet" />
    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <canvas id="three-canvas"></canvas>

    <div class="site">

        <!-- HEADER / HERO -->
        <header id="hdr">
            <div class="logo-ring"><span>♥</span></div>
            <p class="site-sub">Bir cümle · Yüzlerce dil</p>

            <h1 class="hero-phrase" id="hero-phrase">Seni seviyorum</h1>
            <p class="hero-lang" id="hero-lang">Türkçe</p>

            <div class="hero-dots" id="hero-dots"></div>
        </header>

        <!-- 3D CAROUSEL -->
        <div class="divider" id="div1"><span>Döne Döne Söylenen</span></div>
        <section class="carousel-wrap" id="carousel-card">
            <div class="stage">
                <div class="ring" id="ring"></div>
            </div>
            <p class="carousel-hint">Sürükle ya da bırak, kendi kendine dönsün</p>
        </section>

        <!-- FULL GRID -->
        <div class="divider" id="div2"><span>Hepsi Bir Arada</span></div>
        <section class="grid-wrap" id="grid-card">
            <div class="card-tag">50 dilde aynı duygu</div>
            <div class="lang-grid" id="lang-grid"></div>
        </section>

        <footer id="ftr">Hangi dilde söylersem söyleyeyim, kastettiğim hep sensin &nbsp;<em>♥</em></footer>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- App -->
    <script src="script.js"></script>
</body>
</html>
